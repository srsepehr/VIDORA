name: Frontend CI

on:
  pull_request:
  push:
    branches-ignore: ["main"]

permissions:
  contents: read

concurrency:
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify source
        run: |
          npm run lint
          npm run test
          npm run typecheck

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: https://example.supabase.co
          VITE_SUPABASE_ANON_KEY: ci-public-placeholder
          VITE_APP_URL: http://localhost:5173
          VITE_VIDEO_CHAT_URL: https://example--vidora-worker-chat-api.modal.run
