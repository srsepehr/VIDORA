# Drives Modal deploy / health / one-job drain from a runner with Modal
# reachability (the dev sandbox cannot reach Modal). Zero-cost: Modal builds and
# runs on the owner's free workspace; this runner only holds the Modal token.
name: Worker deploy (Modal)

on:
  workflow_dispatch:
    inputs:
      step:
        description: "deploy | health | drain | inspect | subtitles | subtitles-inspect | subtitles-verify | insights | insights-inspect | chat-index | chat-index-inspect"
        type: choice
        default: health
        options: [deploy, health, drain, inspect, subtitles, subtitles-inspect, subtitles-verify, insights, insights-inspect, chat-index, chat-index-inspect, chat-diagnose]
      video_id:
        description: "video id for inspect / subtitles / insights / chat"
        type: string
        default: ""
      force:
        description: "force regeneration (subtitles / insights / chat index)"
        type: boolean
        default: false

jobs:
  modal:
    runs-on: ubuntu-latest
    env:
      MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
      MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Check Modal credentials present
        run: |
          if [ -z "$MODAL_TOKEN_ID" ] || [ -z "$MODAL_TOKEN_SECRET" ]; then
            echo "MODAL_TOKEN_ID / MODAL_TOKEN_SECRET secrets are not set."
            echo "Add them in repo Settings → Secrets → Actions (from 'modal token new')."
            exit 1
          fi
          echo "modal credentials present"
      - name: Install Modal CLI
        run: pip install "modal>=0.64"
      - name: Deploy
        if: ${{ inputs.step == 'deploy' }}
        run: modal deploy worker/modal_app.py
      - name: Health / readiness
        if: ${{ inputs.step == 'health' }}
        run: modal run worker/modal_app.py::check
      - name: Drain one job
        if: ${{ inputs.step == 'drain' }}
        run: modal run worker/modal_app.py::main --max-jobs 1
      - name: Inspect DB state
        if: ${{ inputs.step == 'inspect' }}
        run: modal run worker/modal_app.py::look --video-id "${{ inputs.video_id }}"
      - name: Generate subtitles (backfill, lightweight, no AI models)
        if: ${{ inputs.step == 'subtitles' }}
        run: modal run worker/modal_app.py::subs --video-id "${{ inputs.video_id }}" ${{ inputs.force && '--force' || '' }}
      - name: Inspect subtitle artifacts
        if: ${{ inputs.step == 'subtitles-inspect' }}
        run: modal run worker/modal_app.py::subs_inspect --video-id "${{ inputs.video_id }}"
      - name: Verify stored subtitle files (facts only, no text)
        if: ${{ inputs.step == 'subtitles-verify' }}
        run: modal run worker/modal_app.py::verify_subs --video-id "${{ inputs.video_id }}"
      - name: Generate insights (summary/takeaways/chapters — structural output only)
        if: ${{ inputs.step == 'insights' }}
        run: modal run worker/modal_app.py::insights --video-id "${{ inputs.video_id }}" ${{ inputs.force && '--force' || '' }}
      - name: Inspect insight state (structural facts only)
        if: ${{ inputs.step == 'insights-inspect' }}
        run: modal run worker/modal_app.py::insights_inspect --video-id "${{ inputs.video_id }}"
      - name: Build chat index (transcript-only embeddings)
        if: ${{ inputs.step == 'chat-index' }}
        run: modal run worker/modal_app.py::chat_index --video-id "${{ inputs.video_id }}" ${{ inputs.force && '--force' || '' }}
      - name: Inspect chat index (structural facts only)
        if: ${{ inputs.step == 'chat-index-inspect' }}
        run: modal run worker/modal_app.py::chat_index_inspect --video-id "${{ inputs.video_id }}"
      - name: Diagnose chat retrieval and generation (structural facts only)
        if: ${{ inputs.step == 'chat-diagnose' }}
        run: modal run worker/modal_app.py::chat_diagnose --video-id "${{ inputs.video_id }}"
