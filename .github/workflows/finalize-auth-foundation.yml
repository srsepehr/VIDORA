name: Finalize Vidora auth foundation

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout latest main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Extract and apply verified application patch
        run: |
          python - <<'PY'
          from pathlib import Path

          source = Path('.github/workflows/apply-auth-foundation.yml').read_text().splitlines()
          start = source.index('          VIDORA_PATCH_B64: |') + 1
          end = source.index('        run: |', start)
          payload = ''.join(line[12:] for line in source[start:end])
          Path('/tmp/vidora-auth.b64').write_text(payload)
          PY
          base64 --decode /tmp/vidora-auth.b64 | gzip --decompress > /tmp/vidora-auth.patch
          git apply --check --exclude=.github/workflows/pages.yml /tmp/vidora-auth.patch
          git apply --exclude=.github/workflows/pages.yml /tmp/vidora-auth.patch

      - name: Verify
        env:
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY }}
          VITE_APP_URL: ${{ vars.VITE_APP_URL }}
        run: |
          npm ci
          npm run lint
          npm run test
          npm run typecheck
          npm run build

      - name: Commit application foundation
        run: |
          git config user.name "srsepehr"
          git config user.email "sepehrrahimpour8@gmail.com"
          git add -A
          git commit -m "Connect Vidora authentication and backend foundation"
          git push origin HEAD:main
