name: Verify real Supabase Auth

on:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Verify signup, login, profile trigger, refresh and RLS
        env:
          SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY }}
        run: |
          node <<'NODE'
          const base = process.env.SUPABASE_URL?.replace(/\/$/, '');
          const key = process.env.SUPABASE_ANON_KEY;
          if (!base || !key) throw new Error('Supabase repository variables are missing');

          const stamp = `${Date.now()}-${Math.random().toString(16).slice(2)}`;
          const emailOne = `vidora-e2e-${stamp}-one@example.com`;
          const emailTwo = `vidora-e2e-${stamp}-two@example.com`;
          const password = `Vd!${Date.now()}Qa9`;

          async function request(path, { method = 'GET', body, token = key } = {}) {
            const response = await fetch(`${base}${path}`, {
              method,
              headers: {
                apikey: key,
                Authorization: `Bearer ${token}`,
                ...(body ? { 'Content-Type': 'application/json' } : {}),
              },
              ...(body ? { body: JSON.stringify(body) } : {}),
            });
            const text = await response.text();
            let data = null;
            try { data = text ? JSON.parse(text) : null; } catch { data = { message: text.slice(0, 200) }; }
            return { response, data };
          }

          function requireStatus(result, label) {
            if (!result.response.ok) {
              const code = result.data?.error_code || result.data?.code || 'unknown';
              throw new Error(`${label} failed with HTTP ${result.response.status} (${code})`);
            }
            return result.data;
          }

          const signupOne = requireStatus(await request('/auth/v1/signup', {
            method: 'POST',
            body: { email: emailOne, password, data: { display_name: 'Vidora E2E One' } },
          }), 'first signup');
          if (!signupOne.user?.id || !signupOne.access_token || !signupOne.refresh_token) {
            throw new Error('Signup did not create an immediate session; email confirmation may still be enabled');
          }

          const profileOne = requireStatus(await request(`/rest/v1/profiles?id=eq.${signupOne.user.id}&select=id,email,display_name`, {
            token: signupOne.access_token,
          }), 'profile lookup');
          if (!Array.isArray(profileOne) || profileOne.length !== 1 || profileOne[0].id !== signupOne.user.id) {
            throw new Error('Profile trigger did not create exactly one matching profile');
          }

          const duplicate = await request('/auth/v1/signup', {
            method: 'POST',
            body: { email: emailOne, password, data: { display_name: 'Duplicate' } },
          });
          const duplicateBlocked = !duplicate.response.ok || (Array.isArray(duplicate.data?.user?.identities) && duplicate.data.user.identities.length === 0);
          if (!duplicateBlocked) throw new Error('Duplicate signup was not rejected or safely obfuscated');

          const badLogin = await request('/auth/v1/token?grant_type=password', {
            method: 'POST',
            body: { email: emailOne, password: `${password}wrong` },
          });
          if (badLogin.response.ok || badLogin.response.status !== 400) {
            throw new Error(`Invalid password classification returned HTTP ${badLogin.response.status}`);
          }

          const loginOne = requireStatus(await request('/auth/v1/token?grant_type=password', {
            method: 'POST',
            body: { email: emailOne, password },
          }), 'password login');
          if (!loginOne.access_token || loginOne.user?.id !== signupOne.user.id) throw new Error('Login session is invalid');

          const refreshed = requireStatus(await request('/auth/v1/token?grant_type=refresh_token', {
            method: 'POST',
            body: { refresh_token: loginOne.refresh_token },
          }), 'session refresh');
          if (!refreshed.access_token || refreshed.user?.id !== signupOne.user.id) throw new Error('Session refresh is invalid');

          const plans = requireStatus(await request('/rest/v1/plans?select=id,slug,is_active&order=sort_order'), 'plan lookup');
          if (!Array.isArray(plans) || plans.length < 3) throw new Error('Seed plans are missing');

          const signupTwo = requireStatus(await request('/auth/v1/signup', {
            method: 'POST',
            body: { email: emailTwo, password, data: { display_name: 'Vidora E2E Two' } },
          }), 'second signup');
          if (!signupTwo.user?.id || !signupTwo.access_token) throw new Error('Second signup session is invalid');

          const forbiddenProfile = requireStatus(await request(`/rest/v1/profiles?id=eq.${signupOne.user.id}&select=id`, {
            token: signupTwo.access_token,
          }), 'cross-user profile lookup');
          if (!Array.isArray(forbiddenProfile) || forbiddenProfile.length !== 0) {
            throw new Error('RLS allowed a second user to read the first user profile');
          }

          requireStatus(await request('/auth/v1/logout', { method: 'POST', token: refreshed.access_token }), 'logout');

          console.log(JSON.stringify({
            signup: 'passed',
            profileTrigger: 'passed',
            duplicateProtection: 'passed',
            invalidCredentials: 'passed',
            login: 'passed',
            sessionRefresh: 'passed',
            plans: plans.length,
            rlsIsolation: 'passed',
            logout: 'passed',
            cleanupPattern: 'vidora-e2e-%@example.com'
          }, null, 2));
          NODE
