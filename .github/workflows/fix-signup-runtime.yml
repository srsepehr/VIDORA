name: Fix Vidora signup runtime

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout latest main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Fix signup state and add regression test
        run: |
          python - <<'PY'
          from pathlib import Path

          main_path = Path('src/main.jsx')
          source = main_path.read_text()
          start = source.index('function SignupPage()')
          end = source.index('function AuthLoadingScreen', start)
          signup = source[start:end]
          signup = signup.replace(
              '  const [formError, setFormError] = React.useState("");\n  const [fieldErrors, setFieldErrors] = React.useState({});',
              '  const [formError, setFormError] = React.useState("");\n  const [formNotice, setFormNotice] = React.useState("");\n  const [fieldErrors, setFieldErrors] = React.useState({});',
              1,
          )
          signup = signup.replace(
              '    setFormError("");\n    setFieldErrors({});',
              '    setFormError("");\n    setFormNotice("");\n    setFieldErrors({});',
              1,
          )
          main_path.write_text(source[:start] + signup + source[end:])

          test_path = Path('scripts/test-auth-foundation.mjs')
          tests = test_path.read_text()
          regression = '''\n\ntest("signup route owns the notice state it renders", () => {\n  const source = fs.readFileSync(path.join(root, "src/main.jsx"), "utf8");\n  const signupStart = source.indexOf("function SignupPage()");\n  const signupEnd = source.indexOf("function AuthLoadingScreen", signupStart);\n  const signupSource = source.slice(signupStart, signupEnd);\n\n  assert.match(signupSource, /const \\[formNotice, setFormNotice\\] = React\\.useState\\(""\\);/);\n  assert.match(signupSource, /formNotice=\\{formNotice\\}/);\n});\n'''
          if 'signup route owns the notice state it renders' not in tests:
              test_path.write_text(tests.rstrip() + regression)
          PY

      - name: Verify
        env:
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY }}
          VITE_APP_URL: ${{ vars.VITE_APP_URL }}
        run: |
          npm ci
          npm run lint
          npm run test
          npm run typecheck
          npm run build

      - name: Commit fix
        run: |
          git config user.name "srsepehr"
          git config user.email "sepehrrahimpour8@gmail.com"
          git add src/main.jsx scripts/test-auth-foundation.mjs
          git commit -m "Fix blank signup page runtime error"
          git push origin HEAD:main
