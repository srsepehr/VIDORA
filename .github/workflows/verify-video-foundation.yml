# TEMPORARY workflow — verifies the video pipeline foundation against the
# real Supabase project, applies the pending migration when a DB connection
# secret is configured, and is removed once verification passes.
name: Verify video foundation

on:
  workflow_dispatch:
    inputs:
      apply_migration:
        description: "Apply supabase/migrations/202607090001 via SUPABASE_DB_URL"
        type: boolean
        default: false
      run_verification:
        description: "Run live API verification (auth, RLS, storage, queue RPCs)"
        type: boolean
        default: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Probe configuration
        env:
          DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SERVICE_ROLE: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANON: ${{ vars.VITE_SUPABASE_ANON_KEY }}
          URL: ${{ vars.VITE_SUPABASE_URL }}
        run: |
          echo "secret SUPABASE_DB_URL present: $([ -n "$DB_URL" ] && echo yes || echo no)"
          echo "secret SUPABASE_ACCESS_TOKEN present: $([ -n "$ACCESS_TOKEN" ] && echo yes || echo no)"
          echo "secret SUPABASE_SERVICE_ROLE_KEY present: $([ -n "$SERVICE_ROLE" ] && echo yes || echo no)"
          echo "var VITE_SUPABASE_URL present: $([ -n "$URL" ] && echo yes || echo no)"
          echo "var VITE_SUPABASE_ANON_KEY present: $([ -n "$ANON" ] && echo yes || echo no)"

      - name: Apply pending migration
        if: ${{ inputs.apply_migration }}
        env:
          DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          if [ -z "$DB_URL" ]; then
            echo "SUPABASE_DB_URL secret is not configured — cannot apply migration."
            exit 1
          fi
          psql "$DB_URL" -v ON_ERROR_STOP=1 -f supabase/migrations/202607090001_video_pipeline_foundation.sql
          echo "MIGRATION_APPLIED"

      - name: Live API verification
        if: ${{ inputs.run_verification }}
        env:
          URL: ${{ vars.VITE_SUPABASE_URL }}
          ANON: ${{ vars.VITE_SUPABASE_ANON_KEY }}
        run: |
          set -u
          fail=0
          note() { echo "== $*"; }
          check() { # check <name> <expected> <actual>
            if [ "$2" = "$3" ]; then echo "PASS: $1"; else echo "FAIL: $1 (expected=$2 actual=$3)"; fail=1; fi
          }

          ts=$(date +%s)
          emailA="vidora.verify.a.${ts}@example.com"
          emailB="vidora.verify.b.${ts}@example.com"
          pass="Vf-$ts-Str0ng!"

          signup() {
            curl -s -X POST "$URL/auth/v1/signup" -H "apikey: $ANON" -H "Content-Type: application/json" \
              -d "{\"email\":\"$1\",\"password\":\"$pass\"}"
          }
          A=$(signup "$emailA"); B=$(signup "$emailB")
          jwtA=$(echo "$A" | jq -r '.access_token // empty')
          jwtB=$(echo "$B" | jq -r '.access_token // empty')
          uidA=$(echo "$A" | jq -r '.user.id // empty')
          check "signup user A returns session" "yes" "$([ -n "$jwtA" ] && echo yes || echo no)"
          check "signup user B returns session" "yes" "$([ -n "$jwtB" ] && echo yes || echo no)"
          [ -n "$jwtA" ] && [ -n "$jwtB" ] || { echo "cannot continue without sessions"; exit 1; }

          restA() { curl -s -H "apikey: $ANON" -H "Authorization: Bearer $jwtA" "$@"; }
          restB() { curl -s -H "apikey: $ANON" -H "Authorization: Bearer $jwtB" "$@"; }

          note "insert video row as A"
          video=$(restA -X POST "$URL/rest/v1/videos" -H "Content-Type: application/json" -H "Prefer: return=representation" \
            -d "{\"user_id\":\"$uidA\",\"title\":\"verify\",\"source_type\":\"youtube\",\"source_url\":\"https://www.youtube.com/watch?v=dQw4w9WgXcQ\",\"status\":\"created\"}")
          vid=$(echo "$video" | jq -r '.[0].id // empty')
          check "video insert returns id" "yes" "$([ -n "$vid" ] && echo yes || echo no)"
          [ -n "$vid" ] || { echo "$video"; exit 1; }

          note "enqueue RPC as A (twice — idempotency)"
          j1=$(restA -X POST "$URL/rest/v1/rpc/enqueue_video_processing" -H "Content-Type: application/json" -d "{\"p_video_id\":\"$vid\"}")
          j2=$(restA -X POST "$URL/rest/v1/rpc/enqueue_video_processing" -H "Content-Type: application/json" -d "{\"p_video_id\":\"$vid\"}")
          jid1=$(echo "$j1" | jq -r '.id // empty'); jid2=$(echo "$j2" | jq -r '.id // empty')
          check "enqueue returns job" "yes" "$([ -n "$jid1" ] && echo yes || echo no)"
          check "second enqueue returns same job (idempotent)" "$jid1" "$jid2"
          check "job status queued" "queued" "$(echo "$j1" | jq -r '.status // empty')"
          vstat=$(restA "$URL/rest/v1/videos?id=eq.$vid&select=status" | jq -r '.[0].status // empty')
          check "video status queued after enqueue" "queued" "$vstat"

          note "cross-user isolation (B must not see or touch A's video)"
          bread=$(restB "$URL/rest/v1/videos?id=eq.$vid&select=id" | jq 'length')
          check "B cannot read A's video" "0" "$bread"
          benq=$(restB -X POST "$URL/rest/v1/rpc/enqueue_video_processing" -H "Content-Type: application/json" -d "{\"p_video_id\":\"$vid\"}")
          check "B cannot enqueue A's video" "yes" "$(echo "$benq" | grep -q VIDEO_NOT_FOUND && echo yes || echo no)"
          bjobs=$(restB "$URL/rest/v1/video_jobs?video_id=eq.$vid&select=id" | jq 'length')
          check "B cannot read A's jobs" "0" "$bjobs"

          note "storage: A uploads into own folder; B is denied"
          echo "vidora-verification-object" > /tmp/sample.mp4
          key="$uidA/videos/$vid/source/verify$ts.mp4"
          upA=$(restA -o /dev/null -w "%{http_code}" -X POST "$URL/storage/v1/object/vidora-video-uploads/$key" \
            -H "Content-Type: video/mp4" -H "x-upsert: false" --data-binary @/tmp/sample.mp4)
          check "A uploads to own folder" "200" "$upA"
          upB=$(restB -o /dev/null -w "%{http_code}" -X POST "$URL/storage/v1/object/vidora-video-uploads/$key.evil" \
            -H "Content-Type: video/mp4" --data-binary @/tmp/sample.mp4)
          check "B denied uploading into A's folder" "denied" "$(if [ "$upB" = 400 ] || [ "$upB" = 403 ]; then echo denied; else echo "$upB"; fi)"
          infoA=$(restA -o /dev/null -w "%{http_code}" "$URL/storage/v1/object/info/authenticated/vidora-video-uploads/$key")
          check "A sees own object" "200" "$infoA"
          infoB=$(restB -o /dev/null -w "%{http_code}" "$URL/storage/v1/object/info/authenticated/vidora-video-uploads/$key")
          check "B cannot see A's object" "400" "$(if [ "$infoB" = 400 ] || [ "$infoB" = 403 ] || [ "$infoB" = 404 ]; then echo 400; else echo "$infoB"; fi)"

          note "cancel RPC and safe-update policy"
          cancel=$(restA -X POST "$URL/rest/v1/rpc/cancel_video_processing" -H "Content-Type: application/json" -d "{\"p_video_id\":\"$vid\"}")
          check "cancel succeeds from queued" "yes" "$(echo "$cancel" | grep -qi error && echo no || echo yes)"
          vstat2=$(restA "$URL/rest/v1/videos?id=eq.$vid&select=status" | jq -r '.[0].status // empty')
          check "video cancelled" "cancelled" "$vstat2"
          jstat=$(restA "$URL/rest/v1/video_jobs?video_id=eq.$vid&select=status&order=created_at.desc&limit=1" | jq -r '.[0].status // empty')
          check "job cancelled" "cancelled" "$jstat"

          note "re-enqueue after cancel (retry path)"
          j3=$(restA -X POST "$URL/rest/v1/rpc/enqueue_video_processing" -H "Content-Type: application/json" -d "{\"p_video_id\":\"$vid\"}")
          jid3=$(echo "$j3" | jq -r '.id // empty')
          att3=$(echo "$j3" | jq -r '.attempt // empty')
          check "retry creates a new job" "yes" "$([ -n "$jid3" ] && [ "$jid3" != "$jid1" ] && echo yes || echo no)"
          check "retry increments attempt" "2" "$att3"

          note "cleanup"
          restA -X POST "$URL/rest/v1/rpc/cancel_video_processing" -H "Content-Type: application/json" -d "{\"p_video_id\":\"$vid\"}" > /dev/null
          delobj=$(restA -o /dev/null -w "%{http_code}" -X DELETE "$URL/storage/v1/object/vidora-video-uploads/$key")
          check "A deletes own object" "200" "$delobj"
          delrow=$(restA -o /dev/null -w "%{http_code}" -X DELETE "$URL/rest/v1/videos?id=eq.$vid")
          check "A deletes own video row" "204" "$delrow"

          [ "$fail" = "0" ] && echo "ALL_CHECKS_PASSED" || { echo "SOME_CHECKS_FAILED"; exit 1; }
